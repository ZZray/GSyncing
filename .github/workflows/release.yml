name: release

on:
  push:
    tags:
      - "v*"

# Push tag like `v2.2.0` triggers this. Builds signed MSI + NSIS on Windows,
# uploads them and the matching .sig files to a GitHub Release, then
# generates and uploads latest.json so the in-app updater can find it.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm ci
        run: npm ci

      - name: Release-check gates (build + smoke + tests)
        run: npm run release-check

      - name: Tauri signed build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # If you set a password when generating the key, also add this secret:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: List bundle outputs (debug)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle | Select-Object FullName, Length

      - name: Generate latest.json for in-app updater
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG.TrimStart("v")
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/GSyncing_${version}_x64-setup.exe" -ErrorAction Stop
          $sig  = Get-ChildItem "src-tauri/target/release/bundle/nsis/GSyncing_${version}_x64-setup.exe.sig" -ErrorAction Stop
          $sigText = Get-Content $sig.FullName -Raw
          $body = @{
            version = $version
            notes = "See CHANGELOG.md on GitHub for details."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigText
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/GSyncing_${version}_x64-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 10
          $body | Out-File -FilePath latest.json -Encoding utf8 -NoNewline
          Write-Host "Generated latest.json:"
          Get-Content latest.json

      - name: Create GitHub Release + upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/GSyncing_*_x64-setup.exe
            src-tauri/target/release/bundle/nsis/GSyncing_*_x64-setup.exe.sig
            src-tauri/target/release/bundle/msi/GSyncing_*_x64_en-US.msi
            src-tauri/target/release/bundle/msi/GSyncing_*_x64_en-US.msi.sig
            latest.json
